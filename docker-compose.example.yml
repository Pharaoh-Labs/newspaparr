services:
  newspaparr:
    image: ghcr.io/pharaoh-labs/newspaparr:latest
    container_name: newspaparr
    ports:
      - "1851:1851"   # Web interface
      - "6100:6100"   # noVNC bridge (used by the in-dashboard capture flow)
    volumes:
      - ./data:/app/data   # Persistent data + captured Chrome profiles
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000

      # Optional: notifications via Apprise. Comma-separated URLs.
      # See https://github.com/caronc/apprise for the URL formats supported by
      # ~80 services (Discord, ntfy, Telegram, Slack, mailto, gotify, etc.)
      # - APPRISE_URLS=ntfy://ntfy.sh/your-topic

      # Optional: enable Flask debug mode (verbose errors + auto-reload).
      # Do NOT enable in production — it exposes an interactive debugger.
      # - FLASK_DEBUG=true

      # Optional: behind a reverse proxy
      # - BEHIND_PROXY=true
